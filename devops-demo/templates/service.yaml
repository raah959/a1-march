apiVersion: v1
kind: Service
metadata:
  name: {{ include "devops-demo.fullname" . }}
  labels:
    {{- include "devops-demo.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 80
      targetPort: 5000
      protocol: TCP
      name: http
  selector:
    {{- include "devops-demo.selectorLabels" . | nindent 4 }}
